<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .sub1{
        width: 23%;
        height: 70vh;
        border: 2px solid black;
        /* border-radius: 20px; */
    }
    .sub2{
         width: 23%;
        height: 70vh;
        border-left: 2px solid black;
        border-right: 2px solid black;
    }
     .sub3{
         width: 23%;
        height: 70vh;
        border-top: 2px solid black;
        border-bottom: 2px solid black;
    }
     .sub4{
         width: 23%;
        height: 70vh;
        border-left: 2px solid black;
        border-right: 2px solid black;
        border-bottom: 4px solid red;
    }
      .main1{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .sub11{
        width: 23%;
        height: 70vh;
       border: 2px solid black;
        border-radius: 20px;
    }
    .sub22{
         width: 23%;
        height: 70vh;
       border: 2px solid black;
        border-bottom-right-radius: 80px;
    }
     .sub33{
         width: 23%;
        height: 70vh;
       border: 2px solid black;
        border-left-radius: 80px;
        border-top-right-radius: 80px;
    }
     .sub44{
         width: 23%;
        height: 70vh;
       border: 2px solid black;
       border-radius: 50%;
    }
</style>
<body>
    <div class="main">
        <div class="sub1">border</div>
        <div class="sub2">border</div>
        <div class="sub3">border</div>
        <div class="sub4">border</div>
    </div>
     <div class="main1">
        <div class="sub11">border</div>
        <div class="sub22">border</div>
        <div class="sub33">border</div>
        <div class="sub44">border</div>
    </div>
</body>
</html>
